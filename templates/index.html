<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Vision RAG - Attention Paper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .loader { border-top-color: #f30303; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Style for Markdown content */
        #answer-text h1, #answer-text h2, #answer-text h3 { font-weight: bold; margin-top: 10px; }
        #answer-text ul { list-style-type: disc; margin-left: 20px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto space-y-8">
        
        <header class="text-center">
            <h1 class="text-3xl font-bold text-gray-800">PDF Vision Assistant</h1>
            <p class="text-gray-600 mt-2">Upload a PDF and ask questions about its text, tables, and diagrams.</p>
        </header>

        <section class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
            <h2 class="text-xl font-semibold mb-4">Step 1: Upload PDF</h2>
            <div class="flex items-center space-x-4">
                <input type="file" id="pdf-file" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <button onclick="uploadPDF()" id="upload-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Process PDF</button>
            </div>
            <p id="upload-status" class="mt-3 text-sm font-medium"></p>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
            <h2 class="text-xl font-semibold mb-4">Step 2: Ask a Question</h2>
            <div class="flex flex-col space-y-4">
                <input type="text" id="query-input" placeholder="e.g., Explain the Multi-Head Attention diagram" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="askQuestion()" id="ask-btn" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 font-bold transition">Get Answer</button>
            </div>
        </section>

        <div id="results-area" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-lg shadow-lg border-l-4 border-blue-500">
                <h3 class="text-lg font-bold text-gray-800 mb-2 text-sm uppercase tracking-wider text-gray-400">AI Answer:</h3>
                <div id="answer-text" class="text-gray-700 leading-relaxed"></div>
            </div>

            <div id="image-container" class="hidden bg-white p-4 rounded-lg shadow-lg border border-gray-200">
                <h3 class="text-lg font-bold text-gray-800 mb-4 italic">Retrieved Reference Image:</h3>
                <img id="relevant-image" src="" alt="PDF Figure" class="mx-auto rounded-lg shadow-sm border max-h-[500px]">
            </div>
        </div>

        <div id="global-loader" class="hidden flex flex-col items-center justify-center py-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-500 animate-pulse">Analyzing document and images...</p>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";

        async function uploadPDF() {
            const fileInput = document.getElementById("pdf-file");
            const status = document.getElementById("upload-status");
            if (!fileInput.files[0]) return alert("Please select a file first.");

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            status.innerText = "⏳ Indexing PDF... Please wait.";
            status.className = "mt-3 text-sm font-medium text-blue-600";

            try {
                const response = await fetch(`${API_BASE}/upload`, { method: "POST", body: formData });
                const data = await response.json();
                status.innerText = "✅ " + data.message;
                status.className = "mt-3 text-sm font-medium text-green-600";
            } catch (err) {
                status.innerText = "❌ Connection failed.";
                status.className = "mt-3 text-sm font-medium text-red-600";
            }
        }

        async function askQuestion() {
            const query = document.getElementById("query-input").value;
            const resultsArea = document.getElementById("results-area");
            const answerDiv = document.getElementById("answer-text");
            const imgContainer = document.getElementById("image-container");
            const imgTag = document.getElementById("relevant-image");
            const loader = document.getElementById("global-loader");

            if (!query) return;

            resultsArea.classList.add("hidden");
            imgContainer.classList.add("hidden");
            loader.classList.remove("hidden");

            try {
                const response = await fetch(`${API_BASE}/ask?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                // 2. FIXED ID: answer-text matches the HTML div
                answerDiv.innerHTML = marked.parse(data.answer);

                loader.classList.add("hidden");
                resultsArea.classList.remove("hidden");

                if (data.relevant_image) {
                    imgTag.src = `${API_BASE}${data.relevant_image}`;
                    imgContainer.classList.remove("hidden");
                }
            } catch (err) {
                loader.classList.add("hidden");
                alert("Error fetching answer.");
            }
        }
    </script>
</body>
</html>
