<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Vision RAG - Voice Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Pulse animation for recording */
        .pulse-red {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.1); }
        }

        /* Markdown Styling */
        #answer-text h1, #answer-text h2 { font-weight: bold; margin-top: 15px; font-size: 1.25rem; }
        #answer-text p { margin-bottom: 10px; }
        #answer-text ul { list-style-type: disc; margin-left: 20px; margin-bottom: 10px; }
        #answer-text code { background: #f1f5f9; padding: 2px 4px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <header class="text-center py-4">
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">PDF Vision Assistant</h1>
            <p class="text-slate-500 mt-2">Talk to your documents. Ask about text, tables, or diagrams.</p>
        </header>

        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                <span class="bg-blue-100 text-blue-600 w-7 h-7 rounded-full flex items-center justify-center mr-2 text-sm">1</span>
                Upload Document
            </h2>
            <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-4">
                <input type="file" id="pdf-file" accept=".pdf" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
                <button onclick="uploadPDF()" id="upload-btn" class="w-full md:w-auto bg-blue-600 text-white px-8 py-2.5 rounded-lg hover:bg-blue-700 font-medium transition shadow-sm">Process PDF</button>
            </div>
            <p id="upload-status" class="mt-3 text-sm font-medium hidden"></p>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                <span class="bg-green-100 text-green-600 w-7 h-7 rounded-full flex items-center justify-center mr-2 text-sm">2</span>
                Ask Your Question
            </h2>
            <div class="flex flex-col space-y-4">
                <div class="relative flex items-center">
                    <input type="text" id="query-input" placeholder="Type a message or click the mic..." class="w-full p-4 pr-14 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-700">
                    
                    <button onclick="toggleRecording()" id="mic-btn" class="absolute right-3 p-2 rounded-full hover:bg-slate-100 transition text-slate-400">
                        <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </button>
                </div>
                
                <div id="mic-status" class="hidden flex items-center justify-center space-x-2 text-red-500 font-bold text-sm">
                    <span class="w-2 h-2 bg-red-500 rounded-full pulse-red"></span>
                    <span>RECORDING... CLICK MIC TO FINISH</span>
                </div>

                <button onclick="askQuestion()" id="ask-btn" class="bg-slate-800 text-white px-6 py-4 rounded-xl hover:bg-slate-900 font-bold transition shadow-lg">Run RAG Query</button>
            </div>
        </section>

        <div id="global-loader" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-14 w-14 mb-4"></div>
            <p class="text-slate-500 font-medium animate-pulse">Consulting PDF & Generating Answer...</p>
        </div>

        <div id="results-area" class="hidden space-y-6 pb-12">
            <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs font-black uppercase tracking-widest text-blue-500">AI Analysis</span>
                    <span id="transcription-badge" class="hidden px-2 py-1 bg-slate-100 text-slate-500 text-[10px] rounded italic"></span>
                </div>
                <div id="answer-text" class="text-slate-700 leading-relaxed text-lg"></div>
            </div>

            <div id="image-container" class="hidden bg-white p-4 rounded-2xl shadow-xl border border-slate-100">
                <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-tight italic">Contextual Figure Found:</h3>
                <img id="relevant-image" src="" alt="Retrieved Figure" class="mx-auto rounded-xl shadow-md border border-slate-50 max-h-[500px]">
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        // --- PDF UPLOAD LOGIC ---
        async function uploadPDF() {
            const fileInput = document.getElementById("pdf-file");
            const status = document.getElementById("upload-status");
            if (!fileInput.files[0]) return alert("Please select a PDF file.");

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            status.innerText = "⏳ Reading and Indexing PDF contents...";
            status.className = "mt-3 text-sm font-medium text-blue-600 block";

            try {
                const response = await fetch(`${API_BASE}/upload`, { method: "POST", body: formData });
                const data = await response.json();
                status.innerText = "✅ Success: " + data.message;
                status.className = "mt-3 text-sm font-medium text-green-600 block";
            } catch (err) {
                status.innerText = "❌ Upload failed. Is the server running?";
                status.className = "mt-3 text-sm font-medium text-red-600 block";
            }
        }

        // --- VOICE RECORDING LOGIC ---
        async function toggleRecording() {
            const micIcon = document.getElementById("mic-icon");
            const micStatus = document.getElementById("mic-status");

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        sendVoiceQuery(audioBlob);
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micStatus.classList.remove("hidden");
                    micIcon.classList.add("text-red-600", "pulse-red");
                } catch (err) {
                    alert("Microphone access is required for voice queries.");
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                micStatus.classList.add("hidden");
                micIcon.classList.remove("text-red-600", "pulse-red");
            }
        }

        // --- TEXT QUERY LOGIC ---
        async function askQuestion() {
            const query = document.getElementById("query-input").value;
            if (!query) return;
            
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/ask?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                displayResults(data);
            } catch (err) {
                alert("Query failed.");
            } finally {
                showLoading(false);
            }
        }

        // --- VOICE QUERY LOGIC ---
        async function sendVoiceQuery(blob) {
            showLoading(true);
            const formData = new FormData();
            formData.append("file", blob, "voice_query.wav");

            try {
                const response = await fetch(`${API_BASE}/voice-query`, { method: "POST", body: formData });
                const data = await response.json();
                
                // Show user what was transcribed
                document.getElementById("query-input").value = data.transcription;
                const badge = document.getElementById("transcription-badge");
                badge.innerText = `Heard: "${data.transcription}"`;
                badge.classList.remove("hidden");

                displayResults(data);
            } catch (err) {
                alert("Voice processing failed.");
            } finally {
                showLoading(false);
            }
        }

        // --- UI HELPERS ---
        function showLoading(isLoading) {
            const loader = document.getElementById("global-loader");
            const results = document.getElementById("results-area");
            if (isLoading) {
                loader.classList.remove("hidden");
                results.classList.add("hidden");
            } else {
                loader.classList.add("hidden");
            }
        }

        function displayResults(data) {
            const resultsArea = document.getElementById("results-area");
            const answerDiv = document.getElementById("answer-text");
            const imgContainer = document.getElementById("image-container");
            const imgTag = document.getElementById("relevant-image");

            answerDiv.innerHTML = marked.parse(data.answer || "No answer generated.");
            resultsArea.classList.remove("hidden");

            if (data.relevant_image) {
                imgTag.src = `${API_BASE}${data.relevant_image}`;
                imgContainer.classList.remove("hidden");
            } else {
                imgContainer.classList.add("hidden");
            }
        }
    </script>
</body>
</html>
